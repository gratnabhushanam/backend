services:
  - type: web
    name: gita-wisdom-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_DIALECT
        value: sqlite
      - key: SQLITE_STORAGE
        value: /tmp/gita_wisdom.sqlite
      - key: DB_SYNC_ALTER
        value: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_NAME
        value: Gita Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: Gita Wisdom